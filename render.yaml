services:
  # 1. Backend Service (FastAPI Web Service)
  - type: web
    name: cortex-backend
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn main:combined_app --host 0.0.0.0 --port $PORT
    rootDir: CortexCraft/backend
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # 2. Frontend Service (React Static Site - Zero Cold Starts)
  - type: web
    name: cortex-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: CortexCraft/frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cortex-backend
          property: host

