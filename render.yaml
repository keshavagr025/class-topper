services:
  - type: web
    name: cortex-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn main:combined_app --host 0.0.0.0 --port $PORT
    rootDir: CortexCraft/backend
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: cortex-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    rootDir: CortexCraft/frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cortex-backend
          property: host
